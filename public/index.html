<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Track History</title>
  <script>
    // Apply the saved theme before first paint (Auto = follow the device).
    try {
      var t = localStorage.getItem("th-theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0b" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fbfbfa" />
</head>
<body>
  <div id="app"></div>
  <div id="tooltip" class="tooltip" hidden></div>
  <script type="module" src="/app.js"></script>
  <script>
    // PWA: offline app shell + last-known API data (see sw.js).
    if ("serviceWorker" in navigator) {
      addEventListener("load", () => navigator.serviceWorker.register("/sw.js"));
    }
  </script>
</body>
</html>
