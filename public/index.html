<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Track History</title>
  <script>
    // Apply the saved theme before first paint (Auto = follow the device).
    try {
      var t = localStorage.getItem("th-theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23c8f24e'/><g transform='translate(31.6 22.5) scale(0.0874)'><rect x='0.59' y='115.85' width='163' height='442.77' transform='rotate(-44.9265 0.59 115.85)' fill='%230c1400'/><rect x='311.97' y='198.25' width='163' height='442.77' transform='rotate(44.5184 311.97 198.25)' fill='%230c1400'/></g></svg>" />
</head>
<body>
  <div id="app"></div>
  <div id="tooltip" class="tooltip" hidden></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
