<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Track Evolution</title>
  <meta name="description" content="Track Evolution is a free HPDE / track-day logbook: events, sessions and lap times per track, progress charts, and in-browser telemetry import." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Track Evolution" />
  <meta property="og:title" content="Track Evolution" />
  <meta property="og:description" content="Track Evolution is a free HPDE / track-day logbook: events, sessions and lap times per track, progress charts, and in-browser telemetry import." />
  <meta property="og:url" content="https://trackevolution.app/" />
  <meta property="og:image" content="https://trackevolution.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Track Evolution — your track days, remembered lap by lap" />
  <meta name="twitter:card" content="summary_large_image" />
  <script>
    // Apply the saved theme before first paint (Auto = follow the device).
    try {
      var t = localStorage.getItem("th-theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/favicon.ico" sizes="48x48" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0b" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fbfbfa" />
</head>
<body>
  <div id="app"></div>
  <div id="tooltip" class="tooltip" hidden></div>
  <script type="module" src="/app.js"></script>
  <!-- native:strip-start — removed by mobile/scripts/sync-www.mjs (no SW in the native shell) -->
  <script>
    // PWA: offline app shell + last-known API data (see sw.js).
    if ("serviceWorker" in navigator) {
      addEventListener("load", () => navigator.serviceWorker.register("/sw.js"));
    }
  </script>
  <!-- native:strip-end -->
</body>
</html>
